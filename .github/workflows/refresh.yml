name: Refresh dashboard data

on:
  schedule:
    - cron: '0 * * * *'      # every hour
  workflow_dispatch:          # manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      SP_URL: ${{ secrets.SP_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests openpyxl

      - run: python compute.py

      - run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json
          git diff --cached --quiet || git commit -m "chore: refresh data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
